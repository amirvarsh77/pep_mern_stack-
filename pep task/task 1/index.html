<!DOCTYPE html>
<html>
    <head>
        <title>creating table</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
    <table border="1" cellspacing="0" cellpadding="10">
      <tr>
            <th rowspan="3">Day</th>
            <th colspan="3">PEP Workshop </th>
        </tr>

        <tr>
            <th colspan="2">Schedule</th>
            <th rowspan="2">Topic</th>
        </tr>

        <tr>
           
            <th>Begin</th>
            <th>End</th>
        </tr>

        <tr>
            <td rowspan="2">Friday</td>
            <td>9:00am</td>
            <td>1pm</td>
            <td>HTML </td>
        </tr>
        <tr>
            <td>2pm</td>
            <td>5:30pm</td>
            <td>CSS </td>
        </tr>

        <tr>
            <td rowspan="2">Saturday</td>
            <td>9:00am</td>
            <td>1pm</td>
            <td rowspan="2">JS and React Basics </td>
        </tr>
        <tr>
            <td>2pm</td>
            <td>5:30pm</td>
        </tr>

        <tr>
            <td>Sunday</td>
            <td>9:00am</td>
            <td>5:30pm</td>
            <td>Lets Build Foodie</td>
        </tr>

    </table>
  
    </body>
</html>
